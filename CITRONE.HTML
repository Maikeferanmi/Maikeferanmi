<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Citrone</title>
    <style>
        .citrone{
            margin: auto;
            width: 300px;
        }
        .join{
            width: 180px;
            background-color: rgb(235, 79, 79);
            border: 0px;
            color: white;
            padding: 10px;
            border-radius: 8px;
        }
        .form{
            width: 400px;
            border-radius: 40px;
        }
        
    </style>
</head>
<body>
    <div class="citrone">
        <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTTNZUoTI8rNQIrDPXzY7SGo3bL-_IjRJyESXkvue_ie9kEk_VW" alt="CITRONE" width="100">
    <h1>Join Course</h1>
    <form class="form">
        <div>
            <label for="Text"><strong>First Name</strong></label><br>
            <input type="text" id="fname" name="fname" placeholder="Enter First Name"required><br>
        </div>
        <br>
        <div>
            <label for="Text"> <strong>Last Name</strong></label><br>
            <input type="text" id="lname" name="lname" placeholder="Enter Last Name"required><br>
        </div>
        <br>
        <div>
            <label for="Text"><strong>Role</strong></label><br>
            <input type="text" id="rname" name="rname" placeholder="Student"required><br>
        </div>
        <br>
        <div>
            <label for="Text"><strong>Email Address</strong></label><br>
            <input type="text" id="ename" name="ename" placeholder="Enter email Address"required><br>
        </div>
        <br>
        <div>
            <input type="reset">
        </div>
        <br>
        <div>
            <input type="submit"><br>
        </div>
        <br>
    </form>
   <button class="join">Join Course</button>

    </div>
    
</body>
</html>
