<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
    <style>
        body{
            background: rgb(199, 234, 245);
        }
        div{
            width: 350px;
            height: 400px;
        }
    </style>
</head>
<body>
    <h1 class="text-center text-primary fs-1 mt-5">facebook</h1>
    <div class=" text-center bg-light m-auto shadow-lg p-3 mb-5 bg-body-tertiary rounded">
        <h5 class="mt-2">Log in to Facebook</h5>
        <div class="input-group mb-3 h-auto p-1">
            <input type="text" class="form-control" placeholder="Email address or phone number" aria-label="Username" aria-describedby="basic-addon1">
        </div>
        <div class="input-group mb-3 h-auto p-1 ">
            <input type="text" class="form-control" placeholder="Password" aria-label="Username" aria-describedby="basic-addon1">
        </div>
        <button class="btn btn-primary px-4 py-2 border-0 border-dark-subtle rounded-3 w-100">Log In</button>
        <p class="mt-3 text-primary">Forgotten account?</p>
        <p class="text-secondary">_____________________   or  ______________________</p>
        <button class="btn btn-success px-4 py-2 border-0 border-dark-subtle rounded-3 w-auto">Create New Account</button>
    </div>
