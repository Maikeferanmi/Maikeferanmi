<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>clonenetflix</title>
    <link rel="stylesheet" href="clonenetflix.css">
</head>
<body>
    <div class="header">
        <nav>
            <img src="img/Netflix_Logo_PMS.png" class="logo">
            <div>
                <button class="language-btn">English <img src="img/Screenshot_29-9-2024_20335_.jpeg"></button>
                <button>Sign In</button>
            </div>
        </nav>
        <div class="header-content">
            <h1>Unlimited movies, <br> TV shows and more.</h1>
            <h3><strong>Starts at ₦2,200. Cancel anytime.</strong></h3>
            <p>Ready to watch? Enter your email to create or restart your membership</p>
            <form class="email-signing">
                <input type="email" placeholder="Email address" required>
                <button type="submit">Get Started</button>
            </form>
        </div>
    </div>
</body>
</html>
