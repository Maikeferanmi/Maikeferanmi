<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Colours in CSS</title>
    <style>
        h1{
            color: red;
            text-align: center;
        }
        p{
            color: blue;
            border: 2px solid violet;
        }
        div{
            width: 200px;
            height: 200px;
            background-color:rgba(51, 70, 168, 0.4);
            main{
                width: 200px;
                height:200px;
                background-color: aquamarine;
                }
        }
    </style>
</head>
<body>
    <h1>Colours in CSS</h1>
    <P>i love my mom so much, she is my life, and i love my life, jesus is lord</P>
    <div></div>
    <main></main>
    
</body>
</html>
